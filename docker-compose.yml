services:
  # PHP-FPM Service (Custom build for Symfony extensions)
  php-fpm:
    build:
      context: ./docker/php-fpm # Build from the Dockerfile in this directory
      dockerfile: Dockerfile
    container_name: cart_symfony_php_fpm
    volumes:
      - .:/var/www/html # Mount your project files into the container
      - ./docker/php-fpm/php.ini:/usr/local/etc/php/conf.d/custom.ini # Custom PHP settings
    networks:
      - symfony_network
    environment:
      # Set Symfony environment variables (can be overridden by .env file)
      APP_ENV: dev
      # DATABASE_URL: postgresql://symfony_user:secret_password@db:5432/symfony_db?serverVersion=15&charset=utf8
      # Set this using your Symfony .env file later. For now, use placeholders.
      DATABASE_URL: postgresql://symfony_user:secret_password@database:5432/symfony_db?serverVersion=15&charset=utf8

      # Optional: For Xdebug setup with IDE
      PHP_IDE_CONFIG: "serverName=Docker"
    # If you encounter permission issues with mounted volumes on Linux hosts, uncomment and adjust:
    # user: "1000:1000" # Replace with your host user's UID and GID
    healthcheck: # <-- Add this section
      test: ["CMD", "php-fpm", "-t"] # Or "netstat -tln | grep 9000" if netstat is installed
      interval: 10s
      timeout: 3s
      retries: 3

  # Php command line
  # php-cli:
  #     build:
  #       context: ./docker/php-cli
  #     volumes:
  #       - ./app:/var/www/html
  #     command: sleep 10000
  #     container_name: cart_php_cli

  # Nginx Web Server
  nginx:
    image: nginx:stable-alpine
    container_name: cart_symfony_nginx
    ports:
      - "80:80" # Map host port 80 to container port 80
      - "443:443" 
    volumes:
      - .:/var/www/html # Mount your project files into the container
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf # Custom Nginx config
      - ./docker/nginx/certs:/etc/nginx/certs # Mount SSL certs
      - ./var/log/nginx/:/var/log/nginx 
    depends_on:
     php-fpm: # Nginx needs PHP-FPM to process PHP requests
      condition: service_healthy # <-- IMPORTANT: Wait for PHP to be healthy
    restart: on-failure # <-- Nginx will restart if it fails to start initially  
    networks:
      - symfony_network

  # PostgreSQL Database
  database:
    image: postgres:15-alpine # Use a specific version for consistency
    container_name: cart_symfony_db
    ports:
      - "5432:5432" # Map host port 5432 to container port 5432
    environment:
      POSTGRES_DB: symfony_db # Use env var from .env, default to symfony_db
      POSTGRES_USER: symfony_user
      POSTGRES_PASSWORD: secret_password
    volumes:
      - db_data:/var/lib/postgresql/data # Persistent volume for database data
    networks:
      - symfony_network
    healthcheck: # Check if PostgreSQL is ready
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MailHog (for local email testing)
  mailhog:
    image: mailhog/mailhog
    container_name: cart_symfony_mailhog
    logging:
      driver: 'none' # Disable MailHog logs to keep logs cleaner
    ports:
      - "8025:8025" # Web UI for MailHog
      - "1025:1025" # SMTP port for Symfony to send mail to
    networks:
      - symfony_network

# Define Docker Networks
networks:
  symfony_network:
    driver: bridge # Default network type

# Define Docker Volumes for persistent data
volumes:
  db_data: # For PostgreSQL data
    driver: local
